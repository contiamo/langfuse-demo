services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_NAME:-ragdemo}
      POSTGRES_USER: ${DB_USER:-ragdemo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ragdemo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ragdemo}"]
      interval: 5s
      timeout: 5s
      retries: 10


volumes:
  pgdata:
