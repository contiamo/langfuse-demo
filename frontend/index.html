<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Demo — Sherlock Holmes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; height: 100dvh; }
    header { padding: 1rem 1.5rem; background: #fff; border-bottom: 1px solid #e0e0e0; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p { font-size: 0.85rem; color: #666; margin-top: 0.2rem; }
    #messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .msg { max-width: 80%; padding: 0.75rem 1rem; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
    .user { background: #2563eb; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .assistant { background: #fff; border: 1px solid #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; }
    .assistant.streaming::after { content: "▋"; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    form { display: flex; gap: 0.5rem; padding: 1rem 1.5rem; background: #fff; border-top: 1px solid #e0e0e0; }
    input { flex: 1; padding: 0.6rem 1rem; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 1rem; outline: none; }
    input:focus { border-color: #2563eb; }
    button { padding: 0.6rem 1.25rem; background: #2563eb; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1>🔍 RAG Demo</h1>
    <p>Ask questions about the Sherlock Holmes stories</p>
  </header>
  <div id="messages"></div>
  <form id="form">
    <input id="input" placeholder="e.g. Who is Irene Adler?" autocomplete="off" required />
    <button id="btn" type="submit">Send</button>
  </form>
  <script>
    const messages = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');

    function addMsg(text, role) {
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      el.textContent = text;
      messages.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return el;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;
      input.value = '';
      btn.disabled = true;

      addMsg(question, 'user');
      const reply = addMsg('', 'assistant streaming');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop() ?? '';
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (payload === '[DONE]') break;
            const { delta } = JSON.parse(payload);
            if (delta) reply.textContent += delta;
          }
          reply.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
      } catch (err) {
        reply.textContent = 'Error: ' + err.message;
      }
      reply.classList.remove('streaming');
      btn.disabled = false;
      input.focus();
    });
  </script>
</body>
</html>
