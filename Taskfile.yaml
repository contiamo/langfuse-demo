version: "3"

tasks:
  install:
    desc: Install dependencies
    cmds:
      - uv sync --all-groups

  migrate:
    desc: Run database migrations
    cmds:
      - uv run rag-migrate

  ingest:
    desc: Ingest PDFs/TXTs from data/ into the vector DB
    cmds:
      - uv run rag-ingest --source-dir data/

  db:
    desc: Start the database
    cmds:
      - docker compose up -d db

  stop:
    desc: Stop all Docker services
    cmds:
      - docker compose down

  run:
    desc: Start the RAG agent with built-in web UI (http://localhost:7932)
    aliases: [dev]
    cmds:
      - uv run uvicorn rag.agent:app --host 127.0.0.1 --port 7932 --reload

  lint:
    desc: Lint and format check
    cmds:
      - uv run ruff check src/ tests/
      - uv run ruff format --check src/ tests/

  format:
    desc: Auto-format code
    cmds:
      - uv run ruff format src/ tests/

  test:
    desc: Run unit tests (no API key needed)
    cmds:
      - uv run pytest -v

  "regression:test":
    desc: Run eval dataset via Langfuse experiment, assert score thresholds
    cmds:
      - uv run pytest -v -m regression
