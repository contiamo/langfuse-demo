version: "3"

tasks:
  install:
    desc: Install dependencies
    cmds:
      - uv sync --all-groups

  run:
    desc: Build and start everything in Docker (http://localhost:7932)
    cmds:
      - docker compose up -d --build

  stop:
    desc: Stop all Docker services
    cmds:
      - docker compose down

  migrate:
    desc: Run database migrations (requires running DB)
    cmds:
      - uv run rag-migrate

  ingest:
    desc: Ingest PDFs/TXTs from data/ into the vector DB (requires running DB)
    cmds:
      - uv run rag-ingest --source-dir data/

  dev:
    desc: Start locally with hot-reload (requires running DB via task db)
    cmds:
      - uv run uvicorn rag.app:app --host 127.0.0.1 --port 7932 --reload

  db:
    desc: Start only the database
    cmds:
      - docker compose up -d db

  lint:
    desc: Lint and format check
    cmds:
      - uv run ruff check src/ tests/
      - uv run ruff format --check src/ tests/

  format:
    desc: Auto-format code
    cmds:
      - uv run ruff format src/ tests/

  test:
    desc: Run unit tests (no API key needed)
    cmds:
      - uv run pytest -v

  "dataset:seed":
    desc: Create eval dataset from recent Langfuse traces (requires LANGFUSE credentials)
    cmds:
      - uv run python scripts/seed_dataset.py

  "experiment:run":
    desc: Run dataset through the live pipeline and store results in Langfuse Experiments
    cmds:
      - uv run python scripts/run_experiment.py

  "regression:test":
    desc: Run experiment and exit non-zero if avg faithfulness < 0.70
    cmds:
      - uv run python scripts/run_experiment.py --threshold 0.70
